<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>五言絶句バトル</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="logo-area">
          <div class="logo-mark">五</div>
          <div class="logo-text">
            <h1>五言絶句バトル</h1>
            <p>オンラインで一騎打ちの詩バトル</p>
          </div>
        </div>
      </header>

      <main class="app-main">
        <!-- ホーム：説明テキスト＋モード選択タグ＋バトるボタン -->
        <section class="home" id="home-view">
          <div class="home-center">
            <div class="home-copy">
              <p class="copy-line">絶句でネット対戦。</p>
              <p class="copy-line">絶句で賭ける。</p>
              <p class="copy-line">絶句で投資する。</p>
            </div>

            <div class="home-controls">
              <div class="home-modes">
                <div class="mode-select" id="mode-select">
                  <button
                    type="button"
                    class="mode-select-trigger"
                    id="mode-select-trigger"
                    aria-haspopup="listbox"
                    aria-expanded="false"
                  >
                    <span class="mode-selected-label" id="mode-selected-label">五言絶句</span>
                    <span class="mode-select-arrow">▼</span>
                  </button>
                  <div class="mode-select-menu" id="mode-select-menu" role="listbox">
                    <button
                      class="mode-option"
                      data-mode="gogon-zekku"
                      data-label="五言絶句"
                      data-tag="デフォルト"
                      role="option"
                      aria-selected="true"
                    >
                      <span class="mode-label">五言絶句</span>
                      <span class="mode-tag">デフォルト</span>
                    </button>
                    <button
                      class="mode-option disabled"
                      data-mode="gogon-risshi"
                      data-label="五言律詩"
                      data-tag="準備中"
                      role="option"
                      aria-disabled="true"
                      disabled
                    >
                      <span class="mode-label">五言律詩</span>
                      <span class="mode-tag">準備中</span>
                    </button>
                    <button
                      class="mode-option disabled"
                      data-mode="shichigon-zekku"
                      data-label="七言絶句"
                      data-tag="準備中"
                      role="option"
                      aria-disabled="true"
                      disabled
                    >
                      <span class="mode-label">七言絶句</span>
                      <span class="mode-tag">準備中</span>
                    </button>
                    <button
                      class="mode-option disabled"
                      data-mode="shichigon-risshi"
                      data-label="七言律詩"
                      data-tag="準備中"
                      role="option"
                      aria-disabled="true"
                      disabled
                    >
                      <span class="mode-label">七言律詩</span>
                      <span class="mode-tag">準備中</span>
                    </button>
                  </div>
                </div>
              </div>

              <div class="home-action">
                <button id="battle-button" class="primary-button battle-button">
                  バトる
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- バトル進行エリア（JSで表示を切り替える用の枠だけ先に用意） -->
        <section class="panel panel-secondary" id="battle-view">
          <div class="panel-header compact">
            <h2>対戦中</h2>
            <p class="battle-status-text">対戦相手を探しています…</p>
          </div>

          <div class="battle-meta">
            <div class="timer">
              制限時間
              <span id="timer-display">05:00</span>
            </div>
            <div class="versus" id="versus-display">
              あなた vs ？？？
            </div>
          </div>

          <div class="poem-input-area">
            <label for="poem-input">あなたの五言絶句（漢字のみ・4行×各5字）</label>
            <textarea
              id="poem-input"
              rows="5"
              placeholder="例：\n山雨入春樹\n江雲巻古城\n孤舟離岸影\n遠笛落寒更"
            ></textarea>
            <button id="poem-send-button" class="primary-button full">
              作品を送信する
            </button>
            <p class="helper-text" id="battle-helper-text">
              5分以内に送信してください。送信後は内容を編集できません。（漢字のみ・4行×各5字）
            </p>
          </div>
        </section>

        <!-- 鑑賞画面 -->
        <section class="panel panel-tertiary" id="result-view">
          <div class="panel-header compact">
            <h2>鑑賞タイム</h2>
            <p>二人の五言絶句を味わおう。</p>
          </div>

          <div class="poem-compare">
            <article class="poem-card me">
              <h3>あなたの作品</h3>
              <pre id="my-poem-display" class="poem-text">（まだ送信されていません）</pre>
            </article>

            <article class="poem-card other">
              <h3>相手の作品</h3>
              <pre id="opponent-poem-display" class="poem-text">（相手の送信を待っています）</pre>
            </article>
          </div>

          <div class="result-actions">
            <button id="back-to-home-button" class="secondary-button">
              ホームに戻る
            </button>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <span>五言絶句バトル</span>
        <span class="dot">·</span>
        <span>オンライン対詩プラットフォーム</span>
      </footer>
    </div>

    <!-- 後でここにバトルロジック用のscript.jsをつなぎこみます -->
    <script type="module" src="./script.js"></script>
  </body>
</html>
