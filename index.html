<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>五言絶句バトル</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="topbar-logo">
          <img src="./images/logo.png" alt="五言絶句バトル ロゴ" />
        </div>
        <div class="topbar-search">
          <input
            type="search"
            class="topbar-search-input"
            placeholder="作品やユーザーを検索"
            aria-label="検索"
          />
          <button type="button" class="topbar-search-button">検索</button>
        </div>
        <div class="topbar-stroke-asset" aria-label="画数資産">
          <span class="topbar-stroke-asset-label">画数資産</span>
          <span id="stroke-asset-value" class="topbar-stroke-asset-value">500</span>
        </div>
        <div class="topbar-user">
          <button id="login-button" type="button" class="topbar-login-button">
            ログイン
          </button>
          <button
            id="profile-button"
            type="button"
            class="topbar-profile-button"
            hidden
          >
            <span
              id="profile-button-name"
              class="topbar-user-name"
            ></span>
            <span class="topbar-profile-icon">▼</span>
          </button>
          <div
            id="profile-menu"
            class="topbar-profile-menu"
            hidden
            role="menu"
            aria-labelledby="profile-button"
          >
            <div
              id="profile-menu-name"
              class="topbar-profile-menu-header"
            ></div>
            <button
              id="logout-menu-button"
              type="button"
              class="topbar-profile-menu-item"
              role="menuitem"
            >
              ログアウト
            </button>
          </div>
        </div>
      </header>

      <main class="app-main">
        <section class="home" id="home-view">
          <div class="home-center">
            <div class="home-copy">
              <p class="copy-line">五言絶句を投稿して価値をつくる。</p>
              <p class="copy-line">読む・書く・買うで画数資産が巡る。</p>
            </div>
            <div class="home-action">
              <button id="nav-home-button" class="primary-button battle-button">投稿</button>
              <button id="nav-market-button" type="button" class="secondary-button">漢字ショップ</button>
              <button id="charge-button" type="button" class="secondary-button charge-button">課金</button>
            </div>
          </div>
        </section>

        <section class="panel panel-secondary active" id="compose-view">
          <div class="panel-header compact">
            <h2>投稿</h2>
          </div>
          <div class="poem-input-area">
            <div class="poem-input-row">
              <div class="poem-input-left">
                <label for="poem-input">あなたの五言絶句（漢字のみ・4行×各5字）</label>
                <textarea
                  id="poem-input"
                  rows="5"
                  placeholder="五言絶句を入力"
                ></textarea>
                <button id="poem-send-button" class="primary-button full">作品を投稿する</button>
                <p class="helper-text" id="battle-helper-text">
                  投稿コストは固定費 + 作品画数です。（漢字のみ・4行×各5字）
                </p>
              </div>
              <div class="poem-input-right">
                <p class="stroke-grid-label">画数（縦5×横4）</p>
                <div class="stroke-grid" id="stroke-grid" aria-label="入力中の各文字の画数">
                  <div class="stroke-grid-cell" data-index="0"></div>
                  <div class="stroke-grid-cell" data-index="1"></div>
                  <div class="stroke-grid-cell" data-index="2"></div>
                  <div class="stroke-grid-cell" data-index="3"></div>
                  <div class="stroke-grid-cell" data-index="4"></div>
                  <div class="stroke-grid-cell" data-index="5"></div>
                  <div class="stroke-grid-cell" data-index="6"></div>
                  <div class="stroke-grid-cell" data-index="7"></div>
                  <div class="stroke-grid-cell" data-index="8"></div>
                  <div class="stroke-grid-cell" data-index="9"></div>
                  <div class="stroke-grid-cell" data-index="10"></div>
                  <div class="stroke-grid-cell" data-index="11"></div>
                  <div class="stroke-grid-cell" data-index="12"></div>
                  <div class="stroke-grid-cell" data-index="13"></div>
                  <div class="stroke-grid-cell" data-index="14"></div>
                  <div class="stroke-grid-cell" data-index="15"></div>
                  <div class="stroke-grid-cell" data-index="16"></div>
                  <div class="stroke-grid-cell" data-index="17"></div>
                  <div class="stroke-grid-cell" data-index="18"></div>
                  <div class="stroke-grid-cell" data-index="19"></div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel panel-tertiary active" id="timeline-view">
          <div class="panel-header compact">
            <h2>タイムライン</h2>
            <p id="timeline-status-text">新着投稿を読み込み中...</p>
          </div>
          <div id="timeline-list" class="timeline-list"></div>
        </section>

        <section class="panel panel-secondary" id="market-view">
          <div class="panel-header compact">
            <h2>漢字ショップ</h2>
            <p>価値・価格はすべて画数資産で表示されます。</p>
          </div>
          <div id="market-list" class="market-list"></div>
        </section>

        <section class="panel panel-charge" id="charge-view">
          <div class="panel-header">
            <h2>画数資産を購入</h2>
            <p class="charge-description">値段に応じた画数資産を入手できます。</p>
          </div>
          <div class="charge-packages">
            <div class="charge-package" data-strokes="100" data-price="100">
              <span class="charge-package-strokes">100</span>
              <span class="charge-package-unit">画数資産</span>
              <span class="charge-package-price">¥100</span>
              <button type="button" class="charge-package-buy">購入</button>
            </div>
            <div class="charge-package" data-strokes="500" data-price="400">
              <span class="charge-package-badge">お得</span>
              <span class="charge-package-strokes">500</span>
              <span class="charge-package-unit">画数資産</span>
              <span class="charge-package-price">¥400</span>
              <button type="button" class="charge-package-buy">購入</button>
            </div>
            <div class="charge-package charge-package-popular" data-strokes="1200" data-price="1000">
              <span class="charge-package-badge">人気</span>
              <span class="charge-package-strokes">1,200</span>
              <span class="charge-package-unit">画数資産</span>
              <span class="charge-package-price">¥1,000</span>
              <button type="button" class="charge-package-buy">購入</button>
            </div>
            <div class="charge-package" data-strokes="3000" data-price="2000">
              <span class="charge-package-badge">最大30%OFF</span>
              <span class="charge-package-strokes">3,000</span>
              <span class="charge-package-unit">画数資産</span>
              <span class="charge-package-price">¥2,000</span>
              <button type="button" class="charge-package-buy">購入</button>
            </div>
          </div>
          <div class="charge-back-wrap">
            <button id="charge-back-button" type="button" class="secondary-button">投稿へ戻る</button>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <span>五言絶句バトル</span>
        <span class="dot">·</span>
        <span>五言絶句SNS / 漢字マーケット</span>
      </footer>
    </div>

    <!-- 後でここにバトルロジック用のscript.jsをつなぎこみます -->
    <script type="module" src="./script.js"></script>
  </body>
</html>
